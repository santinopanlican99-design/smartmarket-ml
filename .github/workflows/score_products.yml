name: Score All Products

on:
  workflow_dispatch:

jobs:
  score:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pandas scikit-learn==1.8.0 numpy

      - name: Run scorer
        env:
          SITE_URL: https://secondhandphones.infinityfreeapp.com
          DB_PASS: ${{ secrets.DB_PASS }}
        run: python score_all_products.py

      - name: Upload SQL artifact
        uses: actions/upload-artifact@v4
        with:
          name: scores-sql
          path: scores_output.sql
          retention-days: 7
